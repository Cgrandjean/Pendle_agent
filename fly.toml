app = "pendle-loop-scout"
primary_region = "cdg"

[build]

[deploy]
  release_command = "python scripts/reset_db.py"

[run]
  exec = "python scripts/hf_runner.py"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"